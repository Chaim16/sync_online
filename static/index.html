<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公网临时文件传输系统</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <!-- 移动头部导航栏 -->
        <div class="mobile-header">
            <h1>🌐 公网临时文件传输系统</h1>
        </div>
        
        <!-- 模式选择器 -->
        <div class="mode-selector">
            <div class="mode-btn active" onclick="switchMode('send')">📤 发送</div>
            <div class="mode-btn" onclick="switchMode('receive')">📥 接收</div>
        </div>
        
        <!-- 主内容区域 -->
        <div class="main-content">
            <div id="sendSection" class="form-section active">
                <h2>发送文件</h2>
                <div id="sessionInfo" class="result"></div>
                <button class="btn" onclick="createSession()">创建传输通道</button>
                
                <div id="fileUploadArea" style="display:none;">
                    <div class="input-group">
                        <label>选择文件:</label>
                        <input type="file" id="fileInput" multiple>
                        <div class="helper-text">💡 单个文件最大300MB</div>
                    </div>
                    <button class="btn" onclick="uploadFiles()">开始上传</button>
                    <div id="uploadResults"></div>
                </div>
                
                <!-- 文本传输区域 -->
                <div id="textSendArea" style="display:none; margin-top: 30px;">
                    <h3>发送文本消息</h3>
                    <div class="input-group">
                        <label>输入文本内容:</label>
                        <textarea id="textMessage" rows="4" placeholder="请输入要发送的文本内容..." maxlength="10000"></textarea>
                        <div class="helper-text">
                            💡 最多支持10000个字符 <span id="charCount">(已输入 0 个字符)</span>
                        </div>
                    </div>
                    <button class="btn" onclick="sendTextMessage()">发送文本</button>
                    <div id="textSendResult"></div>
                </div>
            </div>
            
            <div id="receiveSection" class="form-section">
                <h2>接收文件</h2>
                <div class="input-group">
                    <label>输入验证码:</label>
                    <input type="text" id="verificationCode" placeholder="请输入4位验证码">
                </div>
                <button class="btn" onclick="joinSession()">加入通道</button>
                <div id="receiveInfo" class="result"></div>
                
                <div id="downloadArea" style="display:none;">
                    <h3>可下载的文件:</h3>
                    <div id="fileList"></div>
                    
                    <!-- 文本消息显示区域 -->
                    <div id="textMessagesArea" style="margin-top: 30px;">
                        <h3>文本消息:</h3>
                        <div id="textMessages"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
